name: Dead Route CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check all Python files compile
        run: |
          find dead_route -name "*.py" ! -name "__init__.py" -exec python -m py_compile {} \;
          echo "All files compile successfully."

      - name: Validate JSON data files
        run: |
          for f in dead_route/data/*.json; do
            python -c "import json; json.load(open('$f'))" && echo "  ✓ $f" || exit 1
          done

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run test suite
        run: |
          cd dead_route
          python -m pytest tests/ -v --tb=short --junitxml=../test-results.xml

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          cd dead_route
          python -m pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml:../coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dead-route:${{ github.sha }} .

      - name: Verify container starts
        run: |
          # Run with a timeout — game requires interactive input so it will exit
          timeout 5 docker run dead-route:${{ github.sha }} || true
          echo "Container starts successfully."

      - name: Image size check
        run: |
          SIZE=$(docker image inspect dead-route:${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1048576))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 500 ]; then
            echo "WARNING: Image exceeds 500MB"
            exit 1
          fi
